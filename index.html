<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDl9EaTbDx0MTV4c0bIJ4ZQsBfpJ3zqeYQ",
  authDomain: "contractor-hub-d69e9.firebaseapp.com",
  projectId: "contractor-hub-d69e9",
  storageBucket: "contractor-hub-d69e9.firebasestorage.app",
  messagingSenderId: "114205018575",
  appId: "1:114205018575:web:723805aa99a7e9d0372aba"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

window.addEventListener("DOMContentLoaded", () => {

  const loginBtn = document.querySelector("header .btn");
  const adminPanel = document.querySelectorAll("section")[1];

  loginBtn.addEventListener("click", () => {
    auth.signInWithPopup(provider)
      .then(() => console.log("logged in"))
      .catch(err => alert(err.message));
  });

  auth.onAuthStateChanged(user => {
    if (user) {
      loginBtn.innerText = "Logged In";
      adminPanel.style.display = "block";
    }
  });

});
</script>
