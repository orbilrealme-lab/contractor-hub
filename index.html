<!DOCTYPE html>
<html>
<head>
  <title>Contractor Hub</title>

  <style>
    body {
      background:#0f172a;
      color:white;
      font-family: Arial;
      margin:0;
    }

    header {
      padding:20px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .btn {
      background:#38bdf8;
      border:none;
      padding:10px 15px;
      border-radius:8px;
      cursor:pointer;
    }

    section {
      padding:20px;
    }

    .card {
      background:#1f2937;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
    }

    #adminPanel {
      display:none;
    }
  </style>
</head>

<body>

<header>
  <h2>Contractor Hub</h2>
  <button class="btn" id="loginBtn">Admin Login</button>
</header>

<!-- JOBS -->
<section id="jobSection">
  <h3>Jobs</h3>
  <div id="jobList"></div>
</section>

<!-- ADMIN -->
<section id="adminPanel">
  <h3>Admin Panel</h3>

  <div class="card">
    <input id="jobTitle" placeholder="Job title"><br><br>
    <textarea id="jobDesc" placeholder="Job description"></textarea><br><br>
    <button class="btn" id="postBtn">Post Job</button>
  </div>
</section>

<footer style="padding:20px; text-align:center;">
  © 2026 Contractor Hub
</footer>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
try {

  // 🔥 Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyDl9EaTbDx0MTV4c0bIJ4ZQsBfpJ3zqeYQ",
    authDomain: "contractor-hub-d69e9.firebaseapp.com",
    projectId: "contractor-hub-d69e9",
    storageBucket: "contractor-hub-d69e9.firebasestorage.app",
    messagingSenderId: "114205018575",
    appId: "1:114205018575:web:723805aa99a7e9d0372aba"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();
  const provider = new firebase.auth.GoogleAuthProvider();

  const jobsRef = db.collection("jobs");

  const loginBtn = document.getElementById("loginBtn");
  const adminPanel = document.getElementById("adminPanel");
  const jobList = document.getElementById("jobList");

  // 🔐 LOGIN
  loginBtn.addEventListener("click", () => {
    auth.signInWithPopup(provider)
      .catch(err => alert(err.message));
  });

  // 🔐 LEVEL 2 ADMIN LOCK
  const allowedAdmins = [
    "YOUR_EMAIL@gmail.com"  // 👈 CHANGE THIS TO YOUR EMAIL
  ];

  auth.onAuthStateChanged(user => {

    if (user) {

      if (allowedAdmins.includes(user.email)) {
        loginBtn.innerText = "Logged In (Admin)";
        adminPanel.style.display = "block";
      } else {
        alert("Access denied: Not admin");
        auth.signOut();
        loginBtn.innerText = "Admin Login";
        adminPanel.style.display = "none";
      }

    } else {
      loginBtn.innerText = "Admin Login";
      adminPanel.style.display = "none";
    }

  });

  // 📝 POST JOB
  document.getElementById("postBtn").addEventListener("click", async () => {

    const title = document.getElementById("jobTitle").value;
    const desc = document.getElementById("jobDesc").value;

    if (!title || !desc) {
      alert("Please fill all fields");
      return;
    }

    try {
      await jobsRef.add({
        title: title,
        desc: desc,
        created: new Date()
      });

      document.getElementById("jobTitle").value = "";
      document.getElementById("jobDesc").value = "";

    } catch (err) {
      alert("Error: " + err.message);
    }

  });

  // 📡 LIVE JOBS
  jobsRef.onSnapshot(snapshot => {

    jobList.innerHTML = "";

    snapshot.forEach(doc => {
      const job = doc.data();

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h4>${job.title}</h4>
        <p>${job.desc}</p>
      `;

      jobList.appendChild(div);
    });

  });

} catch (e) {
  console.error("Firebase error:", e);
}
</script>

</body>
</html>
