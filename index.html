<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDl9EaTbDx0MTV4c0bIJ4ZQsBfpJ3zqeYQ",
  authDomain: "contractor-hub-d69e9.firebaseapp.com",
  projectId: "contractor-hub-d69e9",
  storageBucket: "contractor-hub-d69e9.firebasestorage.app",
  messagingSenderId: "114205018575",
  appId: "1:114205018575:web:723805aa99a7e9d0372aba"
};


// 🚀 INIT FIREBASE
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const jobsRef = collection(db, "jobs");


// 🔐 LOGIN (SAFE - prevents crash)
window.addEventListener("DOMContentLoaded", () => {

  const loginBtn = document.getElementById("loginBtn");

  if (loginBtn) {
    loginBtn.addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (err) {
        console.error(err);
        alert("Login error: " + err.message);
      }
    });
  } else {
    console.error("loginBtn not found in HTML");
  }

});


// 👤 AUTH STATE (SAFE)
onAuthStateChanged(auth, (user) => {

  const adminPanel = document.getElementById("adminPanel");
  const loginBtn = document.getElementById("loginBtn");

  if (user) {
    if (adminPanel) adminPanel.style.display = "block";
    if (loginBtn) loginBtn.innerText = "Logged In";
  }

});


// 📝 ADD JOB (SAFE)
window.addJob = async function () {

  const titleEl = document.getElementById("jobTitle");
  const descEl = document.getElementById("jobDesc");

  if (!titleEl || !descEl) {
    alert("Job form not found");
    return;
  }

  const title = titleEl.value;
  const desc = descEl.value;

  if (!title || !desc) {
    alert("Please fill all fields");
    return;
  }

  try {
    await addDoc(jobsRef, {
      title,
      desc,
      created: serverTimestamp()
    });

    titleEl.value = "";
    descEl.value = "";

  } catch (err) {
    console.error(err);
    alert("Error adding job: " + err.message);
  }
};


// 📡 REAL-TIME JOB DISPLAY (FULLY SAFE - NO WHITE SCREEN CRASH)
window.addEventListener("DOMContentLoaded", () => {

  const jobList = document.getElementById("jobList");

  if (!jobList) {
    console.error("jobList not found in HTML");
    return;
  }

  onSnapshot(jobsRef, (snapshot) => {

    jobList.innerHTML = "";

    snapshot.forEach((doc) => {
      const job = doc.data();

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h4>${job.title || "No title"}</h4>
        <p>${job.desc || "No description"}</p>
        <span class="tag">LIVE</span>
      `;

      jobList.appendChild(card);
    });

  });

});

</script>
