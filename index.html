<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
try {

  const firebaseConfig = {
    apiKey: "AIzaSyDl9EaTbDx0MTV4c0bIJ4ZQsBfpJ3zqeYQ",
    authDomain: "contractor-hub-d69e9.firebaseapp.com",
    projectId: "contractor-hub-d69e9",
    storageBucket: "contractor-hub-d69e9.firebasestorage.app",
    messagingSenderId: "114205018575",
    appId: "1:114205018575:web:723805aa99a7e9d0372aba"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();
  const provider = new firebase.auth.GoogleAuthProvider();

  const loginBtn = document.getElementById("loginBtn");
  const adminPanel = document.getElementById("adminPanel");
  const jobContainer = document.querySelector("section");

  const jobsRef = db.collection("jobs");

  // 🔐 LOGIN
  loginBtn.addEventListener("click", () => {
    auth.signInWithPopup(provider)
      .catch(err => alert(err.message));
  });

  // 👤 AUTH STATE
  auth.onAuthStateChanged(user => {
    if (user) {
      loginBtn.innerText = "Logged In";
      adminPanel.style.display = "block";
    }
  });

  // 📝 POST JOB
  document.getElementById("postBtn").addEventListener("click", async () => {

    const title = document.getElementById("jobTitle").value;
    const desc = document.getElementById("jobDesc").value;

    if (!title || !desc) {
      alert("Please fill all fields");
      return;
    }

    await jobsRef.add({
      title: title,
      desc: desc,
      created: new Date()
    });

    document.getElementById("jobTitle").value = "";
    document.getElementById("jobDesc").value = "";

  });

  // 📡 REAL-TIME JOBS
  jobsRef.onSnapshot(snapshot => {

    // keep header
    jobContainer.innerHTML = `
      <h3>Jobs</h3>
    `;

    snapshot.forEach(doc => {
      const job = doc.data();

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h4>${job.title}</h4>
        <p>${job.desc}</p>
      `;

      jobContainer.appendChild(div);
    });

  });

} catch (e) {
  console.error("Firebase error:", e);
}
</script>
