<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


// 🔥 YOUR FIREBASE CONFIG (NOW FILLED)
const firebaseConfig = {
  apiKey: "AIzaSyDl9EaTbDx0MTV4c0bIJ4ZQsBfpJ3zqeYQ",
  authDomain: "contractor-hub-d69e9.firebaseapp.com",
  projectId: "contractor-hub-d69e9",
  storageBucket: "contractor-hub-d69e9.firebasestorage.app",
  messagingSenderId: "114205018575",
  appId: "1:114205018575:web:723805aa99a7e9d0372aba"
};


// 🚀 INIT FIREBASE
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();


// 🔐 GOOGLE LOGIN
document.getElementById("loginBtn").addEventListener("click", async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (err) {
    alert("Login error: " + err.message);
  }
});


// 👤 SHOW ADMIN PANEL AFTER LOGIN
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("loginBtn").innerText = "Logged In";
  }
});


// 🧠 FIRESTORE COLLECTION
const jobsRef = collection(db, "jobs");


// 📝 ADD JOB FUNCTION
window.addJob = async function () {

  const title = document.getElementById("jobTitle").value;
  const desc = document.getElementById("jobDesc").value;

  if (!title || !desc) {
    alert("Please fill all fields");
    return;
  }

  try {
    await addDoc(jobsRef, {
      title,
      desc,
      created: serverTimestamp()
    });

    document.getElementById("jobTitle").value = "";
    document.getElementById("jobDesc").value = "";

  } catch (err) {
    alert("Error adding job: " + err.message);
  }
};


// 📡 REAL-TIME JOB DISPLAY
const jobList = document.getElementById("jobList");

onSnapshot(jobsRef, (snapshot) => {
  jobList.innerHTML = "";

  snapshot.forEach((doc) => {
    const job = doc.data();

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h4>${job.title}</h4>
      <p>${job.desc}</p>
      <span class="tag">LIVE</span>
    `;

    jobList.prepend(card);
  });
});

</script>
