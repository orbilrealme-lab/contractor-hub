<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDl9EaTbDx0MTV4c0bIJ4ZQsBfpJ3zqeYQ",
  authDomain: "contractor-hub-d69e9.firebaseapp.com",
  projectId: "contractor-hub-d69e9",
  storageBucket: "contractor-hub-d69e9.firebasestorage.app",
  messagingSenderId: "114205018575",
  appId: "1:114205018575:web:723805aa99a7e9d0372aba"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// WAIT FOR PAGE FULLY LOADED
window.addEventListener("DOMContentLoaded", () => {

  const loginBtn = document.getElementById("loginBtn");
  const adminPanel = document.getElementById("adminPanel");

  // SAFETY CHECKS (THIS PREVENTS WHITE SCREEN CRASH)
  if (!loginBtn) {
    console.error("loginBtn NOT FOUND");
    return;
  }

  loginBtn.addEventListener("click", async () => {
    console.log("Login clicked");

    try {
      await signInWithPopup(auth, provider);
    } catch (err) {
      console.error("LOGIN ERROR:", err);
      alert(err.message);
    }
  });

  // AUTH STATE
  onAuthStateChanged(auth, (user) => {

    if (user) {
      console.log("User logged in:", user.email);

      if (adminPanel) adminPanel.style.display = "block";
      loginBtn.innerText = "Logged In";
    }
  });

});

</script>
