<!DOCTYPE html>
<html>
<head>
  <title>Contractor Hub</title>
  <style>
    body {
      background:#0f172a;
      color:white;
      font-family: Arial;
      margin:0;
    }

    header {
      padding:20px;
      background:#111827;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .btn {
      background:#38bdf8;
      border:none;
      padding:10px 15px;
      border-radius:8px;
      cursor:pointer;
    }

    section {
      padding:20px;
    }

    .card {
      background:#1f2937;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
    }
  </style>
</head>

<body>

<header>
  <h2>Contractor Hub</h2>
  <button class="btn" id="loginBtn">Admin Login</button>
</header>

<section>
  <h3>Jobs</h3>
  <div class="card">Sample Job 1</div>
  <div class="card">Sample Job 2</div>
</section>

<section id="adminPanel" style="display:none;">
  <h3>Admin Panel</h3>
  <input placeholder="Job title"><br><br>
  <textarea placeholder="Job description"></textarea><br><br>
  <button class="btn">Post Job</button>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDl9EaTbDx0MTV4c0bIJ4ZQsBfpJ3zqeYQ",
  authDomain: "contractor-hub-d69e9.firebaseapp.com",
  projectId: "contractor-hub-d69e9",
  storageBucket: "contractor-hub-d69e9.firebasestorage.app",
  messagingSenderId: "114205018575",
  appId: "1:114205018575:web:723805aa99a7e9d0372aba"
};

// Init Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.addEventListener("DOMContentLoaded", () => {

  const loginBtn = document.getElementById("loginBtn");
  const adminPanel = document.getElementById("adminPanel");

  // LOGIN
  loginBtn.addEventListener("click", async () => {
    try {
      await signInWithPopup(auth, provider);
    } catch (err) {
      alert("Login error: " + err.message);
    }
  });

  // AUTH STATE
  onAuthStateChanged(auth, (user) => {
    if (user) {
      loginBtn.innerText = "Logged In";
      adminPanel.style.display = "block";
    }
  });

});

</script>
</body>
</html>
