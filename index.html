<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDl9EaTbDx0MTV4c0bIJ4ZQsBfpJ3zqeYQ",
  authDomain: "contractor-hub-d69e9.firebaseapp.com",
  projectId: "contractor-hub-d69e9",
  storageBucket: "contractor-hub-d69e9.firebasestorage.app",
  messagingSenderId: "114205018575",
  appId: "1:114205018575:web:723805aa99a7e9d0372aba"
};


// 🚀 INIT FIREBASE
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();


// 🔐 LOGIN (SAFE - waits for page load)
window.addEventListener("DOMContentLoaded", () => {

  const loginBtn = document.getElementById("loginBtn");
  const adminPanel = document.getElementById("adminPanel");

  if (loginBtn) {

    loginBtn.addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (err) {
        alert("Login error: " + err.message);
      }
    });

  }

  // 👤 AUTH STATE
  onAuthStateChanged(auth, (user) => {
    if (user) {
      if (adminPanel) adminPanel.style.display = "block";
      loginBtn.innerText = "Logged In";
    }
  });

});

</script>
