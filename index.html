<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDl9EaTbDx0MTV4c0bIJ4ZQsBfpJ3zqeYQ",
  authDomain: "contractor-hub-d69e9.firebaseapp.com",
  projectId: "contractor-hub-d69e9",
  storageBucket: "contractor-hub-d69e9.firebasestorage.app",
  messagingSenderId: "114205018575",
  appId: "1:114205018575:web:723805aa99a7e9d0372aba"
};


// 🚀 INIT FIREBASE
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();


// 📦 FIRESTORE COLLECTION
const jobsRef = collection(db, "jobs");


// ⛔ FIXED SELECTORS (IMPORTANT)
const loginBtn = document.querySelector("header .btn");
const adminPanel = document.querySelectorAll("section")[1];
const jobSection = document.querySelectorAll("section")[0];


// 🔐 LOGIN
loginBtn.addEventListener("click", async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (err) {
    alert("Login error: " + err.message);
  }
});


// 👤 AUTH STATE
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBtn.innerText = "Logged In";
    adminPanel.style.display = "block";
  }
});


// 📝 STEP 3 — ADD JOB FUNCTION
window.postJob = async function () {

  const title = document.querySelector("input").value;
  const desc = document.querySelector("textarea").value;

  if (!title || !desc) {
    alert("Please fill all fields");
    return;
  }

  await addDoc(jobsRef, {
    title,
    desc,
    created: serverTimestamp()
  });

  document.querySelector("input").value = "";
  document.querySelector("textarea").value = "";
};


// 📡 LIVE JOB LOADING
onSnapshot(jobsRef, (snapshot) => {

  jobSection.innerHTML = "<h3>Jobs</h3>";

  snapshot.forEach((doc) => {
    const job = doc.data();

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h4>${job.title}</h4>
      <p>${job.desc}</p>
    `;

    jobSection.appendChild(div);
  });

});

</script>
