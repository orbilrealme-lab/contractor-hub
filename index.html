<!-- FIXED FIREBASE SCRIPT -->
<script>
try {

  const firebaseConfig = {
    apiKey: "AIzaSyDl9EaTbDx0MTV4c0bIJ4ZQsBfpJ3zqeYQ",
    authDomain: "contractor-hub-d69e9.firebaseapp.com",
    projectId: "contractor-hub-d69e9",
    storageBucket: "contractor-hub-d69e9.firebasestorage.app",
    messagingSenderId: "114205018575",
    appId: "1:114205018575:web:723805aa99a7e9d0372aba"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();
  const provider = new firebase.auth.GoogleAuthProvider();

  const jobsRef = db.collection("jobs");
  const projectsRef = db.collection("projects");

  const loginBtn = document.getElementById("loginBtn");
  const adminPanel = document.getElementById("adminPanel");

  const jobList = document.getElementById("jobList");
  const projectList = document.getElementById("projectList");

  // ✅ INPUTS
  const jobTitle = document.getElementById("jobTitle");
  const jobDesc = document.getElementById("jobDesc");

  const projectTitle = document.getElementById("projectTitle");
  const projectDesc = document.getElementById("projectDesc");

  // ⚠️ NEW: file input (YOU MUST CHANGE HTML INPUT TO type="file")
  const projectImageFile = document.getElementById("projectImage");

  // 🧠 CONVERT IMAGE → BASE64
  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
    });
  }

  // 🔐 LOGIN
  loginBtn.addEventListener("click", () => {
    auth.signInWithPopup(provider)
      .catch(err => alert(err.message));
  });

  // 🔐 ADMIN LOCK
  const allowedAdmins = [
    "orbil.realme@gmail.com"
  ];

  auth.onAuthStateChanged(user => {

    if (user && allowedAdmins.includes(user.email)) {
      loginBtn.innerText = "Logged In (Admin)";
      adminPanel.style.display = "block";
    } else if (user) {
      alert("Access denied");
      auth.signOut();
    } else {
      adminPanel.style.display = "none";
      loginBtn.innerText = "Admin Login";
    }

  });

  // 📝 POST JOB
  document.getElementById("postJobBtn").addEventListener("click", async () => {

    if (!jobTitle.value || !jobDesc.value) {
      alert("Fill all job fields");
      return;
    }

    await jobsRef.add({
      title: jobTitle.value,
      desc: jobDesc.value,
      created: new Date()
    });

    jobTitle.value = "";
    jobDesc.value = "";
  });

  // 🏗 POST PROJECT (REAL IMAGE UPLOAD - BASE64)
  document.getElementById("postProjectBtn").addEventListener("click", async () => {

    const file = projectImageFile.files[0];

    if (!projectTitle.value || !projectDesc.value || !file) {
      alert("Fill all project fields + choose image");
      return;
    }

    try {

      const imageBase64 = await toBase64(file);

      await projectsRef.add({
        title: projectTitle.value,
        description: projectDesc.value,
        imageUrl: imageBase64,
        created: new Date()
      });

      projectTitle.value = "";
      projectDesc.value = "";
      projectImageFile.value = "";

    } catch (err) {
      alert(err.message);
    }

  });

  // 📡 JOBS LIVE
  jobsRef.onSnapshot(snapshot => {
    jobList.innerHTML = "";

    snapshot.forEach(doc => {
      const job = doc.data();

      jobList.innerHTML += `
        <div class="card">
          <h4>${job.title}</h4>
          <p>${job.desc}</p>
        </div>
      `;
    });
  });

  // 📡 PROJECTS LIVE
  projectsRef.onSnapshot(snapshot => {
    projectList.innerHTML = "";

    snapshot.forEach(doc => {
      const p = doc.data();

      projectList.innerHTML += `
        <div class="card">
          <img src="${p.imageUrl}" style="width:100%; border-radius:10px;" />
          <h4>${p.title}</h4>
          <p>${p.description}</p>
        </div>
      `;
    });
  });

} catch (e) {
  console.error(e);
}
</script>
